# Upstream with keepalive so nginx holds the connection pool.
# proxy_next_upstream makes nginx retry during the ~3 s API restart window,
# giving zero-downtime from the client's perspective.
upstream api_backend {
  server api:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Retry on connection error / timeout / 5xx during rolling restart
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 15;
    proxy_next_upstream_timeout 30s;
    proxy_connect_timeout 2s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
