kind = "web"
previewPath = "/"
title = "Social Auto Funnel Dashboard"
version = "1.0.0"
id = "artifacts/safd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20769

[services.development]
run = "pnpm --filter @workspace/safd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safd", "run", "build" ]
publicDir = "artifacts/safd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20769"
BASE_PATH = "/"
